<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<title>Zadania Python</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<h1>⚙️ Zadania</h1>

<nav>
<a href="index.html">Start</a>
<a href="kurs.html">Kurs</a>
</nav>

</header>



<section>


<div class="section-title">

<h2>
Twoje zadania programisty
</h2>

<p>
Wykonuj zadania i zdobywaj doświadczenie.
</p>

</div>




<div class="course-grid" id="taskList">


</div>


</section>



<script src="js/User.js"></script>


<script>


let container =
document.getElementById("taskList");



tasks.forEach(task => {



let locked = false;



if(
task.required &&
!userData.completedTasks.includes(task.required)
){

locked = true;

}





container.innerHTML += `


<div class="course-card">


<div class="course-icon">
🐍
</div>


<h3>
${task.name}
</h3>


<span class="badge">
${locked ? "LOCKED" : "BEGINNER"}
</span>



<p>
${task.description}
</p>



<div class="course-info">


<div>
⚡
${task.xp} XP
</div>


<div>
🐍
Python
</div>


</div>




<a 
class="course-btn"
onclick="${locked ? "" : `startTask('${task.id}')`}">


${locked ? "🔒 Zablokowane" : "Rozpocznij zadanie →"}


</a>



</div>


`;


});



</script>


</body>

</html>
